<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart ATS - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-100 flex items-center justify-center px-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
        <div class="bg-gradient-to-r from-blue-700 to-blue-900 text-white px-6 py-6">
            <h1 class="text-2xl font-bold">Smart ATS Login</h1>
            <p class="text-blue-100 mt-1 text-sm">Sign in to continue</p>
        </div>

        <div id="messageBox" class="hidden mx-6 mt-5 px-4 py-3 rounded-lg border text-sm"></div>

        <form id="loginForm" class="px-6 py-6 space-y-4">
            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
                <input id="email" type="email" required class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                <input id="password" type="password" required class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
            </div>

            <div>
                <label for="role" class="block text-sm font-medium text-slate-700 mb-1">Role</label>
                <select id="role" class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="candidate">I am a Candidate</option>
                    <option value="recruiter">I am a Recruiter</option>
                </select>
            </div>

            <button id="loginButton" type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition-colors">
                Login
            </button>
        </form>

        <div class="px-6 pb-6 text-sm text-slate-600">
            New to Smart ATS?
            <a href="register.html" class="text-blue-700 font-semibold hover:underline">Create an account</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:5001';

        document.getElementById('loginForm').addEventListener('submit', async function(event) {
            event.preventDefault();

            const loginButton = document.getElementById('loginButton');
            const payload = {
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value,
                role: document.getElementById('role').value
            };

            showMessage('', 'error', true);
            loginButton.disabled = true;
            loginButton.textContent = 'Logging in...';

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                const data = await response.json().catch(() => ({}));
                if (!response.ok) {
                    throw new Error(data.error || 'Login failed');
                }

                localStorage.setItem('user', JSON.stringify(data.user));

                if (data.user.role === 'candidate') {
                    window.location.href = 'index.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                showMessage(error.message || 'Unable to login right now.');
            } finally {
                loginButton.disabled = false;
                loginButton.textContent = 'Login';
            }
        });

        function showMessage(message, type = 'error', hide = false) {
            const messageBox = document.getElementById('messageBox');

            if (hide) {
                messageBox.className = 'hidden mx-6 mt-5 px-4 py-3 rounded-lg border text-sm';
                messageBox.textContent = '';
                return;
            }

            messageBox.textContent = message;
            messageBox.className = `mx-6 mt-5 px-4 py-3 rounded-lg border text-sm ${type === 'success' ? 'bg-green-50 border-green-200 text-green-800' : 'bg-red-50 border-red-200 text-red-800'}`;
        }
    </script>
</body>
</html>
