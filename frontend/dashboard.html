<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATS Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/dashboard.css" />
</head>
<body>
  <nav class="navbar navbar-expand-lg app-navbar mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold" href="./index.html">ATS Workspace</a>
      <button class="btn btn-outline-danger btn-sm" onclick="logout()">Logout</button>
    </div>
  </nav>

  <div class="container pb-4 dashboard-shell">
    <div id="notifications"></div>
    <div class="dashboard-head">
      <h3 class="mb-2">Dashboard</h3>
      <p class="text-muted mb-4">Role: <span id="roleLabel"></span></p>
      <div class="head-chips">
        <span class="chip">Hiring velocity board</span>
        <span class="chip">Live application updates</span>
        <span class="chip">Interview orchestration</span>
      </div>
    </div>

    <div id="candidateSection" class="d-none">
      <div class="card section-card mb-3">
        <div class="card-body">
          <h5>Find Jobs</h5>
          <div class="row g-2">
            <div class="col-md-4"><input class="form-control" id="searchTitle" placeholder="Search title" /></div>
            <div class="col-md-3"><input class="form-control" id="searchLocation" placeholder="Location" /></div>
            <div class="col-md-3"><input class="form-control" id="searchDept" placeholder="Department" /></div>
            <div class="col-md-2"><button class="btn btn-primary w-100" onclick="loadJobs()">Search</button></div>
          </div>
        </div>
      </div>

      <div class="card section-card mb-3">
        <div class="card-body">
          <h5>Open Jobs</h5>
          <div class="table-responsive">
            <table class="table table-striped align-middle" id="jobsTable"></table>
          </div>
        </div>
      </div>

      <div class="card section-card mb-3">
        <div class="card-body">
          <h5>My Applications</h5>
          <div class="table-responsive">
            <table class="table table-striped" id="appsTable"></table>
          </div>
        </div>
      </div>

      <div class="card section-card">
        <div class="card-body">
          <h5>My Interviews</h5>
          <div class="table-responsive">
            <table class="table table-striped" id="interviewsTable"></table>
          </div>
        </div>
      </div>
    </div>

    <div id="recruiterSection" class="d-none">
      <div class="card section-card mb-3">
        <div class="card-body">
          <h5>Post New Job</h5>
          <form id="jobForm" class="row g-2">
            <div class="col-md-3"><input class="form-control" id="jobTitle" placeholder="Title" required /></div>
            <div class="col-md-3"><input class="form-control" id="jobDept" placeholder="Department" required /></div>
            <div class="col-md-3"><input class="form-control" id="jobLoc" placeholder="Location" required /></div>
            <div class="col-md-2">
              <select class="form-select" id="jobStatus">
                <option>Open</option><option>Closed</option><option>Paused</option>
              </select>
            </div>
            <div class="col-md-1"><button class="btn btn-dark w-100" type="submit">Add</button></div>
          </form>
        </div>
      </div>

      <div class="card section-card mb-3">
        <div class="card-body">
          <h5>Applications</h5>
          <div class="table-responsive">
            <table class="table table-striped align-middle" id="recruiterAppsTable"></table>
          </div>
        </div>
      </div>

      <div class="card section-card">
        <div class="card-body">
          <h5>Schedule Interview</h5>
          <form id="interviewForm" class="row g-2 mb-3">
            <div class="col-md-3"><input class="form-control" id="applicationId" type="number" placeholder="Application ID" required /></div>
            <div class="col-md-4"><input class="form-control" id="scheduledAt" type="datetime-local" required /></div>
            <div class="col-md-3">
              <select class="form-select" id="interviewType"><option>Phone</option><option>Video</option><option>Onsite</option></select>
            </div>
            <div class="col-md-2"><button class="btn btn-primary w-100" type="submit">Schedule</button></div>
          </form>
          <div class="table-responsive">
            <table class="table table-striped" id="recruiterInterviewsTable"></table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="./js/app-common.js"></script>
  <script src="./js/dashboard.js"></script>
</body>
</html>
