<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATS Signup</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./css/common.css" />
  <link rel="stylesheet" href="./css/signup.css" />
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h3>Create Account</h3>
            <p class="text-muted mb-4">Choose role and complete signup.</p>

            <ul class="nav nav-tabs mb-3" id="signupTabs" role="tablist">
              <li class="nav-item"><button class="nav-link active" data-bs-toggle="tab" data-bs-target="#candidateTab" type="button">Candidate</button></li>
              <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#recruiterTab" type="button">Recruiter</button></li>
            </ul>

            <div class="tab-content">
              <div class="tab-pane fade show active" id="candidateTab">
                <form id="candidateForm">
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label class="form-label">Full Name</label>
                      <input class="form-control" id="c_name" required />
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Email</label>
                      <input type="email" class="form-control" id="c_email" required />
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Phone</label>
                      <input class="form-control" id="c_phone" required />
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Password</label>
                      <input type="password" class="form-control" id="c_password" required />
                    </div>
                    <div class="col-12">
                      <label class="form-label">Resume (optional)</label>
                      <input type="file" class="form-control" id="c_resume" />
                    </div>
                  </div>
                  <button class="btn btn-primary mt-3" type="submit">Signup as Candidate</button>
                </form>
              </div>

              <div class="tab-pane fade" id="recruiterTab">
                <form id="recruiterForm">
                  <div class="row g-3">
                    <div class="col-md-6">
                      <label class="form-label">Full Name</label>
                      <input class="form-control" id="r_name" required />
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Company</label>
                      <input class="form-control" id="r_company" required />
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Email</label>
                      <input type="email" class="form-control" id="r_email" required />
                    </div>
                    <div class="col-md-6">
                      <label class="form-label">Password</label>
                      <input type="password" class="form-control" id="r_password" required />
                    </div>
                  </div>
                  <button class="btn btn-dark mt-3" type="submit">Signup as Recruiter</button>
                </form>
              </div>
            </div>

            <div class="mt-3">
              <a href="./login.html">Already have an account? Login</a>
            </div>
            <div id="msg" class="small mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/app-common.js"></script>
  <script src="./js/signup.js"></script>
</body>
</html>
