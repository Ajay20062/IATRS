# ===========================================
# IATRS - Intelligent Applicant Tracking System
# Docker Compose Configuration
# ===========================================

version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: iatrs_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-Killer@12345}
      MYSQL_DATABASE: iatrs
      MYSQL_USER: ats_user
      MYSQL_PASSWORD: ats_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - iatrs_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: iatrs_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - iatrs_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: iatrs_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://ats_user:ats_pass@db:3306/iatrs
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-this-in-production}
      ENABLE_EMAIL: ${ENABLE_EMAIL:-false}
      ENABLE_CACHE: ${ENABLE_CACHE:-false}
      ENABLE_RATE_LIMIT: ${ENABLE_RATE_LIMIT:-false}
      DEBUG: ${DEBUG:-true}
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - iatrs_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: iatrs_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - iatrs_network
    profiles:
      - production

networks:
  iatrs_network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
